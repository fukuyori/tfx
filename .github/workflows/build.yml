name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test (macOS)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          xcrun --find swift && swift --version

      - name: Build (Debug)
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme tfx \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
          | tee build.log

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme tfx \
            -destination 'platform=macOS' \
            -resultBundlePath ./test-results.xcresult \
            CODE_SIGNING_ALLOWED=NO \
          | tee test.log

      - name: Upload result bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results.xcresult
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-and-test-logs
          path: |
            build.log
            test.log
          if-no-files-found: ignore
          retention-days: 7
